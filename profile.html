<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="profile-container">
        <!-- Левая панель -->
        <div class="profile-sidebar">
            <div class="avatar-wrapper">
                <img id="avatarImage" class="avatar" src="" alt="Аватар">
                <label for="avatarInput" class="avatar-upload-btn">
                    <span>📷</span>
                </label>
                <input type="file" id="avatarInput" accept="image/*">
            </div>
            <h2 id="profileName">Имя</h2>
            <button id="logoutBtn" class="btn-danger">Выйти</button>
        </div>

        <!-- Правая часть -->
        <div class="profile-content">
            <h1>Личный кабинет</h1>
            <p>Добро пожаловать в ваш профиль</p>

            <!-- Две кнопки -->
            <div class="profile-info">
                <button class="info-card" onclick="window.location.href='tasks.html'">
                    <span class="icon">📚</span>
                    <h3>Задачи</h3>
                    <p>Решайте задания</p>
                </button>
                <button class="info-card" onclick="window.location.href='topics.html'">
                    <span class="icon">📖</span>
                    <h3>Учебник</h3>
                    <p>Изучайте темы</p>
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
