<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задачи</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="profile-container">
        <!-- Левая панель -->
        <div class="profile-sidebar">
            <!-- Аватар -->
            <div class="avatar-wrapper">
                <img id="avatarImage" class="avatar" src="" alt="Аватар">
                <label for="avatarInput" class="avatar-upload-btn">
                    <span>📷</span>
                </label>
                <input type="file" id="avatarInput" accept="image/*">
            </div>

            <!-- Имя -->
            <h2 id="profileName">Имя</h2>

            <!-- СТАТИСТИКА ПОД АВАТАРОМ -->
            <div class="stats-container">
                <div class="stat-item">
                    <span class="stat-label">📊 Всего попыток</span>
                    <span class="stat-number" id="totalTasks">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">✅ Правильно</span>
                    <span class="stat-number" id="completedTasks">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">📈 Прогресс</span>
                    <span class="stat-number" id="progressPercent">0%</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">❌ Неправильно</span>
                    <span class="stat-number" id="wrongCount">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">✅ Решено правильно -</span>
                    <span class="stat-number" id="as">0</span>
                </div>
            </div>
        </div>

        <!-- Правая часть -->
        <div class="profile-content">
            <button class="back-link" onclick="window.location.href='profile.html'">← Назад</button>

            <h1>Мои задачи</h1>
            <p>Решайте задачи и отслеживайте прогресс</p>

            <!-- Контейнер для теста -->
            <div id="container" style="margin-top: 20px;"></div>

            <!-- Контейнер для задач -->
            <div id="tasksContainer" style="margin-top: 30px;"></div>

            <!-- Кнопка -->
            <div style="margin-top: 30px;">
                <button id="button" class="btn-start">
                    Типы данных
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
